<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Helvetica, Arial, sans-serif">

  
  <rect width="900" height="1200" fill="#ffffff"></rect>

  
  <text x="450" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Survey Procedure — HK Public Housing Perception Study</text>

  
  <rect x="300" y="80" width="300" height="70" rx="10" fill="#1a1a2e"></rect>
  <text x="450" y="111" text-anchor="middle" font-size="13" font-weight="600" fill="white">TASK 1: Instructions</text>
  <text x="450" y="131" text-anchor="middle" font-size="11" fill="#b0b8c9">Consent + study overview</text>
  <text x="450" y="147" text-anchor="middle" font-size="11" fill="#b0b8c9">Participant clicks &#34;Begin&#34;</text>

  
  <line x1="450" y1="150" x2="450" y2="180" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>

  
  <rect x="170" y="180" width="560" height="36" rx="8" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"></rect>
  <text x="450" y="196" text-anchor="middle" font-size="11" font-weight="600" fill="#7d5a00">Counterbalance node assigns participant to List 1–5</text>
  <text x="450" y="210" text-anchor="middle" font-size="10" fill="#7d5a00">(cyclic Latin square — each list = 12 scenes at balanced appropriation levels)</text>

  
  <line x1="450" y1="216" x2="450" y2="246" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>

  
  <rect x="150" y="246" width="600" height="36" rx="8" fill="#1a1a2e"></rect>
  <text x="450" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="white">TASK 2: Photo Estates — repeated 12×</text>
  <text x="450" y="279" text-anchor="middle" font-size="10" fill="#b0b8c9">(one iteration per row in assigned spreadsheet, order randomised per participant)</text>

  
  <rect x="130" y="290" width="20" height="430" rx="4" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"></rect>
  <text x="120" y="510" text-anchor="middle" font-size="11" fill="#1a1a2e" transform="rotate(-90,120,510)">× 12 trials</text>

  
  <rect x="170" y="296" width="560" height="90" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="2"></rect>
  <text x="450" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">DISPLAY: Stimulus Photo (8 seconds)</text>
  <text x="450" y="336" text-anchor="middle" font-size="11" fill="#333">Full-screen photograph from assigned list</text>
  <text x="450" y="352" text-anchor="middle" font-size="11" fill="#333">5 appropriation levels: ivc000 → ivc025 → ivc050 → ivc075 → ivc100</text>
  <text x="450" y="368" text-anchor="middle" font-size="11" fill="#333">Auto-advance after 8s (participant cannot skip)</text>
  <rect x="340" y="375" width="220" height="4" rx="2" fill="#2196F3" opacity="0.3"></rect>

  
  <line x1="450" y1="386" x2="450" y2="410" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>

  
  <polygon points="450,410 510,440 450,470 390,440" fill="#fff8e1" stroke="#f0ad4e" stroke-width="2"></polygon>
  <text x="450" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#7d5a00">display =</text>
  <text x="450" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#7d5a00">AttentionCheck?</text>

  
  <line x1="510" y1="440" x2="620" y2="440" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"></line>
  <text x="565" y="432" text-anchor="middle" font-size="10" fill="#333">No</text>
  <rect x="620" y="415" width="130" height="50" rx="8" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"></rect>
  <text x="685" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#7d5a00">ATTENTION</text>
  <text x="685" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#7d5a00">CHECK</text>
  <text x="685" y="462" text-anchor="middle" font-size="9" fill="#7d5a00">Grey image → select 4</text>

  
  <line x1="450" y1="470" x2="450" y2="495" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"></line>
  <text x="462" y="487" text-anchor="start" font-size="10" fill="#333">Yes</text>

  
  <line x1="685" y1="465" x2="685" y2="560" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4,3"></line>
  <line x1="685" y1="560" x2="640" y2="560" stroke="#f0ad4e" stroke-width="1.5" marker-end="url(#arrow)"></line>

  
  <rect x="170" y="495" width="440" height="130" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"></rect>
  <text x="390" y="517" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">DISPLAY: Rating Screen</text>
  <text x="390" y="535" text-anchor="middle" font-size="11" fill="#333">All 6 questions shown simultaneously</text>

  
  <text x="185" y="557" font-size="10" fill="#444">① Pleasantness  1 ——————— 7  (Very unpleasant → Very pleasant)</text>
  <text x="185" y="572" font-size="10" fill="#444">② Safety  1 ——————— 7  (Very unsafe → Very safe)</text>
  <text x="185" y="587" font-size="10" fill="#444">③ Agency 1  &#34;Residents personally shaped this space&#34;  1–7</text>
  <text x="185" y="602" font-size="10" fill="#444">④ Agency 2  &#34;Residents have a say in how space is used&#34;  1–7</text>
  <text x="185" y="617" font-size="10" fill="#444">⑤ Agency 3  &#34;Space reflects presence and choices of residents&#34;  1–7</text>

  <rect x="520" y="600" width="70" height="22" rx="5" fill="#4CAF50"></rect>
  <text x="555" y="615" text-anchor="middle" font-size="10" fill="white" font-weight="600">Next →</text>

  
  <line x1="390" y1="625" x2="390" y2="655" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>
  <line x1="450" y1="625" x2="450" y2="655" stroke="#555" stroke-width="2"></line>

  
  <rect x="270" y="655" width="360" height="50" rx="10" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"></rect>
  <text x="450" y="677" text-anchor="middle" font-size="12" font-weight="600" fill="#555">Inter-Stimulus Interval</text>
  <text x="450" y="693" text-anchor="middle" font-size="11" fill="#777">Blank white screen — 1000 ms — auto-advance</text>

  
  <line x1="155" y1="705" x2="155" y2="296" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"></line>
  <line x1="270" y1="680" x2="155" y2="680" stroke="#1a1a2e" stroke-width="1.5"></line>

  
  <line x1="450" y1="705" x2="450" y2="735" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>

  
  <rect x="270" y="735" width="360" height="30" rx="6" fill="#e0e0e0"></rect>
  <text x="450" y="755" text-anchor="middle" font-size="11" fill="#444">After 12 trials completed</text>

  
  <line x1="450" y1="765" x2="450" y2="793" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>

  
  <rect x="170" y="793" width="560" height="120" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"></rect>
  <text x="450" y="815" text-anchor="middle" font-size="12" font-weight="700" fill="#6a1b9a">TASK 3: Demographics Questionnaire</text>
  <text x="185" y="836" font-size="10" fill="#444">• Age, gender, country of residence</text>
  <text x="185" y="851" font-size="10" fill="#444">• Ever lived in public / social housing?</text>
  <text x="185" y="866" font-size="10" fill="#444">• Visited Hong Kong? (lived / tourist / no)</text>
  <text x="185" y="881" font-size="10" fill="#444">• Familiarity with HK public housing  1–7</text>
  <text x="185" y="896" font-size="10" fill="#444">• Ever lived in high-density building (5+ floors)?</text>

  
  <line x1="450" y1="913" x2="450" y2="943" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>

  
  <rect x="300" y="943" width="300" height="70" rx="10" fill="#1a1a2e"></rect>
  <text x="450" y="967" text-anchor="middle" font-size="12" font-weight="700" fill="white">Thank You Screen</text>
  <text x="450" y="984" text-anchor="middle" font-size="10" fill="#b0b8c9">Brief debrief + contact email</text>
  <text x="450" y="999" text-anchor="middle" font-size="10" fill="#b0b8c9">Redirect to Prolific</text>

  
  <line x1="450" y1="1013" x2="450" y2="1040" stroke="#555" stroke-width="2" marker-end="url(#arrow)"></line>

  
  <rect x="350" y="1040" width="200" height="50" rx="25" fill="#4CAF50"></rect>
  <text x="450" y="1062" text-anchor="middle" font-size="13" font-weight="700" fill="white">Study Complete</text>
  <text x="450" y="1079" text-anchor="middle" font-size="10" fill="white">~10 minutes total</text>

  
  <rect x="50" y="1105" width="800" height="75" rx="8" fill="white" stroke="#ddd" stroke-width="1"></rect>
  <text x="450" y="1123" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Legend</text>

  <rect x="70" y="1132" width="16" height="16" rx="3" fill="#1a1a2e"></rect>
  <text x="92" y="1144" font-size="10" fill="#333">Task / structural node</text>

  <rect x="210" y="1132" width="16" height="16" rx="3" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"></rect>
  <text x="232" y="1144" font-size="10" fill="#333">Photo display (8 s)</text>

  <rect x="340" y="1132" width="16" height="16" rx="3" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"></rect>
  <text x="362" y="1144" font-size="10" fill="#333">Rating screen</text>

  <rect x="460" y="1132" width="16" height="16" rx="3" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"></rect>
  <text x="482" y="1144" font-size="10" fill="#333">Attention check / counterbalance</text>

  <rect x="660" y="1132" width="16" height="16" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"></rect>
  <text x="682" y="1144" font-size="10" fill="#333">Demographics</text>

  <text x="70" y="1168" font-size="10" fill="#777">N = 150 participants (165 recruited) · Prolific Academic · Gorilla Experiment Builder · Pre-registered on OSF</text>

  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"></path>
    </marker>
  </defs>

</svg>